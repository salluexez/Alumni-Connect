name: alumni_connect
description: "Alumni Connect - A platform connecting students with alumni for networking, mentorship, and career growth."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase ───────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2

  # ── State Management ───────────────────────────────────
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # ── Navigation ─────────────────────────────────────────
  go_router: ^15.1.2

  # ── Dependency Injection ───────────────────────────────
  get_it: ^8.0.3
  injectable: ^2.5.0

  # ── UI & Utilities ─────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  timeago: ^3.7.0
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.1
  dartz: ^0.10.1
  agora_rtc_engine: ^6.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
